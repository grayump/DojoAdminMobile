<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NRKD">
  <meta name="theme-color" content="#7B1113">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <title>NRKD Chito-ryu</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Import screen (shown when no data) -->
  <div id="import-screen" class="screen screen-import">
    <div class="import-content">
      <div class="import-wordmark">NRKD</div>
      <div class="import-subtitle">Chito-ryu Companion</div>
      <div id="import-info" class="import-info hidden"></div>
      <button class="btn-import" onclick="App.triggerImport()">Import Snapshot</button>
      <p class="import-help">
        Export a snapshot from the admin site using the
        <strong>download</strong> button in the navigation bar,
        then import it here.
      </p>
      <input type="file" id="file-input" accept=".json,application/json"
             class="hidden" onchange="App.handleFile(this)">
    </div>
  </div>

  <!-- App shell (shown after import) -->
  <div id="app-shell" class="screen hidden">

    <header class="app-header">
      <span id="page-title" class="header-title">Members</span>
      <button class="header-sync-btn" onclick="App.showImportScreen()">
        Update data
      </button>
    </header>

    <main id="main-content" class="app-main"></main>

    <nav class="bottom-nav">
      <button class="nav-tab active" data-page="members" onclick="App.navigate('members')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span class="nav-label">Members</span>
      </button>
      <button class="nav-tab" data-page="grading" onclick="App.navigate('grading')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span class="nav-label">Grading</span>
      </button>
      <button class="nav-tab" data-page="curriculum" onclick="App.navigate('curriculum')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span class="nav-label">Ranks</span>
      </button>
    </nav>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
